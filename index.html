<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <title>Pesquisa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/survey.css"/>
</head>
<body>
<div class="shell">
  <header class="hdr">
    <div class="hdr-top">
      <img id="hdrLogo" class="hdr-logo hidden" alt="" width="120" height="28"/>
      <span id="hdrTitle" class="hdr-title">Pesquisa</span>
      <span class="hdr-status">● online</span>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="pFill"></div></div>
      <div class="prog-lbl" id="pLbl">0/0</div>
    </div>
  </header>

  <main class="chat" id="chat">
    <div class="date-lbl">Hoje</div>
  </main>

  <footer class="inp" id="inp">
    <div class="opts hidden" id="opts"></div>
    <button type="button" class="cfm hidden" id="cfm">Confirmar →</button>
    <div class="txt-wrap hidden" id="txtWrap">
      <textarea class="txt-in" id="txtIn" placeholder="Digite aqui..." rows="1"
        maxlength="2000" oninput="autoResize(this)" onkeydown="onKey(event)"></textarea>
      <span class="txt-char-count hidden" id="txtCount" aria-live="polite"></span>
      <button type="button" class="send" onclick="submitText()" aria-label="Enviar">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="scl hidden" id="scl"></div>
  </footer>
</div>

<script src="config.js"></script>
<script src="questions.js"></script>
<script src="js/survey-engine.js"></script>
</body>
</html>
